name: ci

on:
  push:
  pull_request:

jobs:
  simulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r simulator/requirements.txt
      - name: Run simulator
        run: |
          python simulator/generate_events.py --out out/events.jsonl --count 10
          test -s out/events.jsonl
